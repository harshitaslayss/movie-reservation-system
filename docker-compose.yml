

services:

  postgres:
    image: postgres:17
    container_name: movie_system_db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: harshita
      POSTGRES_DB: system_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: movie_app

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
          SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/system_db
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: harshita
          SPRING_REDIS_HOST: redis
          SPRING_REDIS_PORT: 6379
          JWT_SECRET: 5367566859703373367639792F423F452848284D6251655468576D5A71347437


  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin

    depends_on:
      - postgres

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

  redis:
    image: redis:latest

    ports:
    - "6379:6379"

volumes:
  postgres_data: